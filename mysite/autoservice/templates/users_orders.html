{% extends 'base.html' %}
{% block title %}Mano uzsakymai{% endblock %}
{% block content %}
<h1>Mano uzsakymai:</h1>
<div>
    <a class="btn btn-primary" href="{% url 'order_create' %}">Naujas uzsakymas</a>
</div>

{% for order in orders %}
<p><a href="{% url 'order' order.pk %}" class="{% if order.is_overdue %}text-danger{% endif %}">{{ order }}</a></p>
{% endfor %}
{% endblock %}
